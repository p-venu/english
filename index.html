<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Eng-Tel Dictionary</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --accent: #0d6efd;
    }
    body.dark { --bg: #000; --text: #fff; }
    body.light { --bg: #f8f9fa; --text: #000; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      touch-action: pan-y;
    }
    #container { height: 100vh; display: flex; flex-direction: column; }

    #image-container {
      flex: 1;
      position: relative;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    #main-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #text-box {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      padding: 18px 15px;
      border-top: 4px solid var(--accent);
      text-align: center;
    }
    #english-text { font-size: 21px; font-weight: bold; margin-bottom: 6px; }
    #telugu-text { font-size: 24px; line-height: 1.3; }

    #controls {
      padding: 12px;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }
    button:active { transform: scale(0.95); }

    #settings {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      z-index: 1000;
      display: none;
      color: white;
    }
    .setting-row { margin: 12px 0; }
    select, input { width: 100%; padding: 8px; border-radius: 6px; margin-top: 5px; }
  </style>
</head>
<body class="dark">
  <div id="container">
    <div id="image-container">
      <img id="main-image" src="" alt="Dictionary Image"/>
      <div id="text-box">
        <div id="english-text"></div>
        <div id="telugu-text"></div>
      </div>
    </div>

    <div id="controls">
      <button onclick="prevWord()">◀ Prev</button>
      <button onclick="togglePlay()" id="playBtn">▶ Play</button>
      <button onclick="nextWord()">Next ▶</button>
      <button onclick="toggleSettings()">⚙ Settings</button>
    </div>
  </div>

  <!-- Settings -->
  <div id="settings">
    <h3>Settings</h3>
    <div class="setting-row">
      <label>Theme</label>
      <select id="themeSelect" onchange="changeTheme()">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Audio Order</label>
      <select id="audioOrder">
        <option value="en-te-enex-tex">English → Telugu → Eng Ex → Tel Ex</option>
        <option value="te-en-tex-enex">Telugu → English → Tel Ex → Eng Ex</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Delay between audios (ms)</label>
      <input type="number" id="delayAudio" value="700"/>
    </div>
    <div class="setting-row">
      <label>Delay between words (ms)</label>
      <input type="number" id="delayWord" value="1200"/>
    </div>
    <div class="setting-row">
      <label><input type="checkbox" id="autoPlay" checked/> Auto Play Next Word</label>
    </div>
    <div style="margin-top:20px; text-align:center;">
      <button onclick="saveAndCloseSettings()" style="background:#0d6efd; width:48%;">Save</button>
      <button onclick="toggleSettings()" style="width:48%;">Cancel</button>
    </div>
  </div>

  <script>
    let words = [];
    let currentIndex = 0;
    let isPlaying = true;
    let currentAudio = null;
    let BASE_URL = "https://p-venu.github.io/";
    let touchStartY = 0;

    async function loadExcels() {
      try {
        const [enRes, teRes] = await Promise.all([
          fetch(`${BASE_URL}english/english_words.xlsx`),
          fetch(`${BASE_URL}telugu/telugu_words.xlsx`)
        ]);

        const enData = await flattenExcelColumnWise(enRes);
        const teData = await flattenExcelColumnWise(teRes);

        words = enData.map((en, i) => ({
          english: en,
          telugu: teData[i] || "",
          image: `${BASE_URL}dictionary_images/${sanitize(en)}_image.png`,
          enAudio: `${BASE_URL}english/english_audios/english_${sanitize(en)}.mp3`,
          teAudio: `${BASE_URL}telugu/telugu_audios/telugu_${sanitize(en)}.mp3`,
          enEx: `${BASE_URL}english/english_example_1_audios/english_${sanitize(en)}_example_1.mp3`,
          teEx: `${BASE_URL}telugu/telugu_example_1_audios/telugu_${sanitize(en)}_example_1.mp3`
        }));

        currentIndex = 0;
        showCurrentWord();
        startPlayback();
      } catch(e) {
        console.error(e);
        alert("Failed to load dictionary. Check internet.");
      }
    }

    // ==================== COLUMN-WISE FLATTENING (A1,A2,A3... then B1,B2...) ====================
    async function flattenExcelColumnWise(response) {
      const array = await response.arrayBuffer();
      const wb = XLSX.read(array, {type:"array"});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, {header:1, defval:""});

      let flat = [];
      const numCols = json[0] ? json[0].length : 0;

      // Column by column (A to Z)
      for (let col = 0; col < numCols; col++) {
        for (let row = 0; row < json.length; row++) {
          const cell = json[row][col];
          const val = String(cell || "").trim();
          if (val) flat.push(val);
        }
      }
      return flat;
    }

    function sanitize(str) {
      return String(str).toLowerCase()
        .replace(/[^a-z0-9]/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_|_$/g, '');
    }

    function showCurrentWord() {
      const w = words[currentIndex];
      document.getElementById("main-image").src = w.image;
      document.getElementById("english-text").textContent = w.english;
      document.getElementById("telugu-text").textContent = w.telugu;
    }

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
    }

    function playCurrentWord() {
      stopAudio();
      if (!isPlaying) return;
      const w = words[currentIndex];
      const order = document.getElementById("audioOrder").value;
      const seq = order === "en-te-enex-tex" ? 
        [w.enAudio, w.teAudio, w.enEx, w.teEx] : 
        [w.teAudio, w.enAudio, w.teEx, w.enEx];

      let i = 0;
      const playNext = () => {
        if (i >= seq.length) {
          setTimeout(() => {
            if (document.getElementById("autoPlay").checked) nextWord();
          }, parseInt(document.getElementById("delayWord").value || 1200));
          return;
        }
        currentAudio = new Audio(seq[i]);
        currentAudio.play().catch(()=>{});
        currentAudio.onended = () => {
          i++;
          setTimeout(playNext, parseInt(document.getElementById("delayAudio").value || 700));
        };
      };
      playNext();
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      document.getElementById("playBtn").textContent = isPlaying ? "⏸ Pause" : "▶ Play";
      if (isPlaying) playCurrentWord();
      else stopAudio();
    }

    function nextWord() {
      stopAudio();
      currentIndex = (currentIndex + 1) % words.length;
      showCurrentWord();
      if (isPlaying) playCurrentWord();
    }

    function prevWord() {
      stopAudio();
      currentIndex = (currentIndex - 1 + words.length) % words.length;
      showCurrentWord();
      if (isPlaying) playCurrentWord();
    }

    // Touch Handlers - YouTube Shorts Style
    const imageContainer = document.getElementById("image-container");
    imageContainer.addEventListener("touchstart", e => {
      touchStartY = e.changedTouches[0].screenY;
    });

    imageContainer.addEventListener("touchend", e => {
      const touchEndY = e.changedTouches[0].screenY;
      const diff = touchStartY - touchEndY;

      if (Math.abs(diff) > 80) {
        if (diff > 0) nextWord();   // Swipe Up
        else prevWord();            // Swipe Down
      } else {
        togglePlay();               // Tap
      }
    });

    function toggleSettings() {
      const s = document.getElementById("settings");
      s.style.display = s.style.display === "block" ? "none" : "block";
    }

    function saveAndCloseSettings() {
      toggleSettings();
    }

    function changeTheme() {
      document.body.className = document.getElementById("themeSelect").value;
    }

    function startPlayback() {
      isPlaying = true;
      document.getElementById("playBtn").textContent = "⏸ Pause";
      showCurrentWord();
      playCurrentWord();
    }

    // Keyboard
    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") nextWord();
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") prevWord();
      if (e.key === " ") { e.preventDefault(); togglePlay(); }
    });

    window.onload = loadExcels;
  </script>
</body>
</html>
